services:
  svxreflector:
    build: .
    restart: unless-stopped
    ports:
      - "5300:5300/tcp"   # client TCP
      - "5300:5300/udp"   # client UDP
      - "5302:5302/tcp"   # trunk server
      - "8080:8080/tcp"   # HTTP status endpoint — remove if HTTP_SRV_PORT is not set in config
    volumes:
      - ./config/svxreflector.conf:/etc/svxlink/svxreflector.conf:ro
      - pki:/etc/svxlink/pki  # persistent storage for certificates

volumes:
  pki:
